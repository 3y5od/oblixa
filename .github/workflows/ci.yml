        run: npm run check:api-route-rate-limit-coverage

      - name: API rate-limit coverage report (telemetry)
        run: npm run report:api-route-rate-limit-coverage

      - name: Cron route auth coverage (explicit guardrail)
        run: npm run check:cron-route-auth

      - name: Scheduled cron route wrapper coverage
        run: npm run check:scheduled-cron-route-wrappers

      - name: Vercel cron paths vs canary map parity
        run: npm run check:vercel-cron-canary-parity

      - name: Integration contract surface report (telemetry)
        run: npm run report:integration-contract-surface

      - name: Integration contract resilience check
        run: npm run check:integration-contract-resilience

      - name: Concurrency hotspot report (telemetry)
        run: npm run report:concurrency-hotspots

      - name: Concurrency hotspot ratchet
        run: npm run check:concurrency-hotspots-ratchet

      - name: Policy conformance score (telemetry)
        run: npm run report:policy-conformance-score

      - name: Control efficacy report (telemetry)
        run: npm run report:control-efficacy

      - name: Artifact integrity report (telemetry)
        run: npm run report:artifact-integrity

      - name: Artifact integrity checks
        run: npm run check:artifact-integrity

      - name: Dependency sunset readiness (telemetry)
        run: npm run report:dependency-sunset-readiness

      - name: Canary blast-radius report (telemetry)
        run: npm run report:canary-blast-radius

      - name: Chaos readiness report (telemetry)
        run: npm run report:chaos-readiness

      - name: SLO budget comparison
        run: npm run test:slo-budgets

      - name: Change-impact check mapping (telemetry)
        run: npm run report:ci-change-impact

      - name: CI provenance report (telemetry)
        if: ${{ always() }}
        run: npm run report:ci-provenance

      - name: SBOM generation
        run: npm run sbom

      - name: Lockfile integrity drift
        run: npm run check:lockfile-integrity-drift

      - name: SBOM integrity
        run: npm run check:sbom-integrity

      - name: Dual SBOM format, VEX, and SARIF evidence
        run: npm run check:sbom-formats-vex-sarif

      - name: Release artifact provenance
        run: npm run check:release-artifact-provenance

      - name: Release provenance optional boundaries
        run: npm run check:reproducible-build-hash && npm run check:container-signing-slsa-stub

      - name: Outbound events + client hash + copy audits (verify parity)
        run: npm run check:ci-verify-extras

      - name: Vercel cron vs codebase alignment
        run: npm run check:vercel-cron

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Type/lint ratchet
        run: npm run check:type-lint-ratchet

      - name: Server action complexity ratchet
        run: npm run check:server-action-complexity

      - name: Type/lint strictness telemetry
        if: ${{ always() }}
        run: npm run report:type-lint-strictness

  quality_unit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security matrix JSON for Vitest evidence
        run: npm run build:security-control-coverage-matrix

      - name: Vitest logic + UI coverage
        run: npm run test:coverage

  quality_security:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install "semgrep>=1.90.0"

      - name: Semgrep (OSS + Oblixa rules)
        run: semgrep scan --config p/ci --config p/typescript --config semgrep/oblixa-security.yml --config semgrep/oblixa-performance.yml --config semgrep/oblixa-surface.yml --severity ERROR --error .

      - name: OSV dependency scan
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        with:
          scan-args: |-
            --lockfile=package-lock.json

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality_build_e2e:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
      PLAYWRIGHT_JSON_REPORT: test-results/playwright-report.json
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Gate E2E (authenticated credentials)
        id: gate_e2e
        env:
          REQUIRE_CI_E2E_AUTH: ${{ vars.REQUIRE_CI_E2E_AUTH }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: |
          bash scripts/github-actions/secret-gate.sh "quality_build_e2e" "REQUIRE_CI_E2E_AUTH" "E2E_TEST_EMAIL,E2E_TEST_PASSWORD"

      - name: Skip E2E (missing credentials)
        if: ${{ steps.gate_e2e.outputs.run != 'true' }}
        run: echo "Skipping E2E (waived via repository variable or secrets missing)."

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        run: npm ci

      - name: Cache Playwright browsers
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'playwright.config.ts') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Production build
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        run: npm run build

      - name: Autonomous perf Tier A (emit run.json; post-build)
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        env:
          PERF_SKIP_BUILD: "1"
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          RUNNER_OS: ${{ runner.os }}
        run: npm run perf:autonomous:postbuild

      - name: Upload autonomous perf run artifact
        if: ${{ steps.gate_e2e.outputs.run == 'true' && always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: autonomous-perf-run
          path: artifacts/autonomous-perf-run.json
          if-no-files-found: ignore
          retention-days: 14
          include-hidden-files: false

      - name: Install Playwright Chromium
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm run test:e2e:smoke

      - name: Playwright current product release smoke
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm run test:e2e:current-product

      - name: Playwright accessibility lanes
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm run test:e2e:a11y

      - name: Playwright visual baselines (public/external)
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm run test:e2e:visual

      - name: Playwright stability telemetry
        if: ${{ steps.gate_e2e.outputs.run == 'true' && always() }}
        run: npm run report:e2e:stability

      - name: Playwright stability thresholds
        if: ${{ steps.gate_e2e.outputs.run == 'true' && always() }}
        run: npm run check:e2e:stability-threshold

      - name: CI provenance report (telemetry)
        if: ${{ steps.gate_e2e.outputs.run == 'true' && always() }}
        run: npm run report:ci-provenance

  quality_static_surface:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client
      - name: V10 inventory lock
        run: npm run check:release-inventory-lock
      - name: V10 release evidence
        run: npm run check:release-evidence
      - name: V10 release privacy scan
        run: npm run check:release-privacy-scan
      - name: V10 migration smoke (disposable PostgreSQL)
        env:
          V10_MIGRATION_SMOKE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          V10_MIGRATION_SMOKE_ALLOW_MUTATING_DATABASE: "1"
        run: npm run check:migration-smoke:current:strict
      - name: V10 complete closure
        run: npm run check:complete-closure
      - name: V10 zero exclusion report
        run: npm run check:zero-exclusion-report
      - name: V10 suite
        run: npm run check:release-suite-current
      - name: Surface suite pipeline
        run: npm run pipeline:surface:suite
      - name: Operational UI strict audit
        run: npm run audit:ui-operational:strict
      - name: Core terminology strict audit
        run: npm run audit:core-terminology:strict

  quality_static_governance:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Governance checks
        run: npm run check:owner-metadata && npm run check:checks-integrity-meta && npm run check:static-check-determinism && npm run check:branch-protection-drift && npm run check:config-drift && npm run check:semgrep-rulepack-integrity && npm run check:supply-chain-security-matrix && npm run check:gitleaks-allowlist && npm run check:git-history-secret-exposure && npm run check:github-actions-permissions
      - name: Workflow and command integrity
        run: npm run check:command-reference-integrity && npm run check:script-registry-integrity && npm run check:unused-script-files && npm run check:wrapper-reintroduction && npm run check:tier-coverage:strict && npm run check:workflow-tier-coverage:strict

  quality_static_codehealth:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Static codehealth pipeline
        run: npm run pipeline:ci:static
      - name: Bundle budget guard
        run: npm run check:bundle-budget
      - name: Import boundary and cycle checks
        run: npm run check:import-boundaries && npm run check:dependency-cycles && npm run check:script-complexity-ratchet && npm run check:feature-flag-lifecycle && npm run check:frontend-component-complexity && npm run check:server-action-complexity
      - name: Script unit tests
        run: npm run test:scripts:unit
      - name: Script runtime checks
        run: npm run test:scripts:checks

  # Optional: set repository secret E2E_ONBOARDING_FULL to a non-empty value to run deep onboarding + multi-browser Playwright.
  quality_e2e_onboarding_full:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
      E2E_ONBOARDING_BLOCKING: "1"
      E2E_ONBOARDING_A11Y: "1"
      E2E_ONBOARDING_EXPORT: "1"
      PLAYWRIGHT_ONBOARDING_DEEP: "1"
    steps:
      - name: Gate onboarding full run
        id: gate_onboarding
        env:
          REQUIRE_CI_ONBOARDING_FULL: ${{ vars.REQUIRE_CI_ONBOARDING_FULL }}
          E2E_ONBOARDING_FULL: ${{ secrets.E2E_ONBOARDING_FULL }}
        run: |
          bash scripts/github-actions/secret-gate.sh "quality_e2e_onboarding_full flag" "REQUIRE_CI_ONBOARDING_FULL" "E2E_ONBOARDING_FULL"

      - name: Skip onboarding full run (flag disabled)
        if: ${{ steps.gate_onboarding.outputs.run != 'true' }}
        run: echo "Skipping onboarding full run because E2E_ONBOARDING_FULL is not set."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
        if: ${{ steps.gate_onboarding.outputs.run == 'true' }}

      - name: Gate onboarding authenticated credentials
        id: gate_onboarding_auth
        if: ${{ steps.gate_onboarding.outputs.run == 'true' }}
        env:
          REQUIRE_CI_E2E_AUTH: ${{ vars.REQUIRE_CI_E2E_AUTH }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: |
          bash scripts/github-actions/secret-gate.sh "quality_e2e_onboarding_full" "REQUIRE_CI_E2E_AUTH" "E2E_TEST_EMAIL,E2E_TEST_PASSWORD"

      - name: Skip onboarding deep E2E (missing credentials)
        if: ${{ steps.gate_onboarding.outputs.run == 'true' && steps.gate_onboarding_auth.outputs.run != 'true' }}
        run: echo "Skipping onboarding deep E2E because authenticated credentials are unavailable."

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        if: ${{ steps.gate_onboarding.outputs.run == 'true' && steps.gate_onboarding_auth.outputs.run == 'true' }}
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate_onboarding.outputs.run == 'true' && steps.gate_onboarding_auth.outputs.run == 'true' }}
        run: npm ci

      - name: Cache Playwright browsers
        if: ${{ steps.gate_onboarding.outputs.run == 'true' && steps.gate_onboarding_auth.outputs.run == 'true' }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'playwright.config.ts') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Production build
        if: ${{ steps.gate_onboarding.outputs.run == 'true' && steps.gate_onboarding_auth.outputs.run == 'true' }}
        run: npm run build

      - name: Install Playwright Chromium, Firefox, WebKit
        if: ${{ steps.gate_onboarding.outputs.run == 'true' && steps.gate_onboarding_auth.outputs.run == 'true' }}
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Onboarding deep E2E (multi-browser)
        if: ${{ steps.gate_onboarding.outputs.run == 'true' && steps.gate_onboarding_auth.outputs.run == 'true' }}
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm run test:e2e:onboarding-deep

      - name: Multi-browser public smoke
        if: ${{ steps.gate_onboarding.outputs.run == 'true' && steps.gate_onboarding_auth.outputs.run == 'true' }}
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm run test:e2e:multi-browser

  # Opt-in: set `if: true` (or gate on `vars`) to run four-way autodiscovered `check:*` shards (complements quality_static_*).
  # Set repository variable ENABLE_QA_ULTIMATE_PR_SHARD=true to run four-way autodiscovered check:* shards on PRs.
  qa_ultimate_pr_shard:
    if: ${{ vars.ENABLE_QA_ULTIMATE_PR_SHARD == 'true' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Autodiscovered check:* batch shard
        run: npm run qa:sweep:checks:batch
        env:
          CI: "true"
          QA_CHECK_BATCH_TOTAL: "4"
          QA_CHECK_BATCH_INDEX: ${{ matrix.shard_index }}

  # Single gate for branch protection / downstream jobs (parallel work happens in quality_*).
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [quality_static_security, quality_static_surface, quality_static_governance, quality_static_codehealth, quality_unit, quality_security]
    steps:
      - name: All checks passed
        run: echo "ok"

  runtime_comprehensive_pass:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: quality
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Gate runtime comprehensive pass
        id: gate_runtime
        env:
          REQUIRE_RUNTIME_COMPREHENSIVE: ${{ vars.REQUIRE_RUNTIME_COMPREHENSIVE }}
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          COMPREHENSIVE_PASS_EMAIL: ${{ secrets.COMPREHENSIVE_PASS_EMAIL }}
          COMPREHENSIVE_PASS_PASSWORD: ${{ secrets.COMPREHENSIVE_PASS_PASSWORD }}
        run: |
          bash scripts/github-actions/secret-gate.sh "runtime_comprehensive_pass" "REQUIRE_RUNTIME_COMPREHENSIVE" "STAGING_BASE_URL,CRON_SECRET,SUPABASE_SERVICE_ROLE_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,COMPREHENSIVE_PASS_EMAIL,COMPREHENSIVE_PASS_PASSWORD"

      - name: Skip runtime comprehensive pass (missing secrets)
        if: ${{ steps.gate_runtime.outputs.run != 'true' }}
        run: |
          echo "Skipping runtime comprehensive pass (waived or secrets missing)."
          echo "Required when run: STAGING_BASE_URL, CRON_SECRET, SUPABASE_SERVICE_ROLE_KEY,"
          echo "  NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,"
          echo "  COMPREHENSIVE_PASS_EMAIL, COMPREHENSIVE_PASS_PASSWORD"
          echo "Optional when running: HC_RUNTIME_COMPREHENSIVE_PING (healthcheck hooks)."

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        if: ${{ steps.gate_runtime.outputs.run == 'true' }}
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate_runtime.outputs.run == 'true' }}
        run: npm ci

      - name: Healthchecks start
        if: ${{ steps.gate_runtime.outputs.run == 'true' }}
        env:
          HC_RUNTIME_COMPREHENSIVE_PING: ${{ secrets.HC_RUNTIME_COMPREHENSIVE_PING }}
        run: |
          if [ -n "$HC_RUNTIME_COMPREHENSIVE_PING" ]; then
            curl -fsS -m 10 "$HC_RUNTIME_COMPREHENSIVE_PING/start"
          fi

      - name: Runtime comprehensive pass (staging + local Next fallback)
        if: ${{ steps.gate_runtime.outputs.run == 'true' }}
        env:
          COMPREHENSIVE_PASS_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          COMPREHENSIVE_PASS_EMAIL: ${{ secrets.COMPREHENSIVE_PASS_EMAIL }}
          COMPREHENSIVE_PASS_PASSWORD: ${{ secrets.COMPREHENSIVE_PASS_PASSWORD }}
          NEXT_PUBLIC_APP_URL: https://www.oblixa.io
          APP_BASE_URL: https://www.oblixa.io
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          set -euo pipefail
          base="${COMPREHENSIVE_PASS_BASE_URL%/}"
          probe=$(curl -g -s -o /dev/null -w "%{http_code}" --max-time 20 "${base}/api/reminders/send" || echo "000")
          if [ "$probe" = "401" ]; then
            npm run check:comprehensive-pass
          else
            echo "WARN staging cron probe returned HTTP ${probe} (expected 401); building local Next for comprehensive-pass fallback"
            export RESEND_API_KEY="${RESEND_API_KEY:-runtime-comprehensive-local-placeholder}"
            export EMAIL_FROM="${EMAIL_FROM:-onboarding@resend.dev}"
            npm run build
            PORT=3000 npm run start &
            start_pid=$!
            trap 'kill "$start_pid" 2>/dev/null || true' EXIT
            code="000"
            for _ in $(seq 1 90); do
              code=$(curl -g -s -o /dev/null -w "%{http_code}" --max-time 8 http://127.0.0.1:3000/api/reminders/send || echo "000")
              if [ "$code" = "401" ]; then break; fi
              sleep 2
            done
            if [ "$code" != "401" ]; then
              echo "::error::Local next start never returned HTTP 401 for unsigned GET /api/reminders/send (last status ${code})"
              exit 1
            fi
            export COMPREHENSIVE_PASS_BASE_URL=http://127.0.0.1:3000
            npm run check:comprehensive-pass
          fi

      - name: CI provenance report (telemetry)
        if: ${{ steps.gate_runtime.outputs.run == 'true' && always() }}
        run: npm run report:ci-provenance

      - name: Healthchecks success
        if: ${{ steps.gate_runtime.outputs.run == 'true' && success() }}
        env:
          HC_RUNTIME_COMPREHENSIVE_PING: ${{ secrets.HC_RUNTIME_COMPREHENSIVE_PING }}
        run: |
          if [ -n "$HC_RUNTIME_COMPREHENSIVE_PING" ]; then
            curl -fsS -m 10 "$HC_RUNTIME_COMPREHENSIVE_PING"
          fi

      - name: Healthchecks fail
        if: ${{ steps.gate_runtime.outputs.run == 'true' && failure() }}
        env:
          HC_RUNTIME_COMPREHENSIVE_PING: ${{ secrets.HC_RUNTIME_COMPREHENSIVE_PING }}
        run: |
          if [ -n "$HC_RUNTIME_COMPREHENSIVE_PING" ]; then
            curl -fsS -m 10 "$HC_RUNTIME_COMPREHENSIVE_PING/fail"
          fi
