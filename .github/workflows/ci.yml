name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Repo Actions secrets injected into every job env (individual jobs still gate on presence where needed).
# Machine-readable matrix: artifacts/ci-secret-job-matrix.json
env:
  E2E_ONBOARDING_FULL: ${{ secrets.E2E_ONBOARDING_FULL }}
  STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  COMPREHENSIVE_PASS_EMAIL: ${{ secrets.COMPREHENSIVE_PASS_EMAIL }}
  COMPREHENSIVE_PASS_PASSWORD: ${{ secrets.COMPREHENSIVE_PASS_PASSWORD }}
  HC_RUNTIME_COMPREHENSIVE_PING: ${{ secrets.HC_RUNTIME_COMPREHENSIVE_PING }}
  ALLOW_SECRET_GATED_SKIP: ${{ vars.ALLOW_SECRET_GATED_SKIP }}
  ALLOW_CI_SKIP_E2E_AUTH: ${{ vars.ALLOW_CI_SKIP_E2E_AUTH }}
  ALLOW_CI_SKIP_RUNTIME_COMPREHENSIVE: ${{ vars.ALLOW_CI_SKIP_RUNTIME_COMPREHENSIVE }}

jobs:
  # Split so static analysis + unit tests overlap with build + E2E (wall-clock win on CI).
  quality_static_security:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: SBOM (CycloneDX, package-lock)
        run: npm run sbom

      - name: SBOM license allowlist spot-check
        run: npm run check:license-sbom

      - name: SBOM diff / VEX stub gate
        run: npm run check:sbom-diff

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cyclonedx-sbom
          path: cyclonedx-sbom.json
          if-no-files-found: ignore

      - name: Dependency risk summary (telemetry)
        if: ${{ always() }}
        run: npm run report:dependency-risk

      - name: Security static greps (src/, strict)
        run: npm run check:security-static:strict:grep

      - name: GitHub workflow danger patterns
        run: npm run check:github-workflows-security

      - name: Workflow secret-gates registry (Epic 2)
        run: npm run check:github-scheduled-workflows-secrets

      - name: API runtime smoke registry drift (Epic 3)
        run: npm run check:api-runtime-smoke-registry

      - name: Strict route contract gates
        run: npm run check:route-functionality && npm run check:openapi-spec-contract && npm run check:api-problem-json && npm run check:middleware-vercel-metadata

      - name: Maximal assurance scaffolding (plan snapshot, epics, waivers, catalog index)
        run: npm run check:maximal-assurance-scaffolding

      - name: PWA / deep-link well-known allowlist
        run: npm run check:pwa-well-known

      - name: .env.example parity vs src process.env
        run: npm run check:env-example-parity

      - name: Onboarding QA matrix (tests + strict lib/onboarding glob)
        run: npm run check:onboarding-qa-matrix

      - name: Authenticated A11Y path-matrix integrity
        run: npm run check:authenticated-a11y-matrix

      - name: UI surface consistency contracts
        run: npm run check:ui-surface-consistency && npm run check:page-heading-contract && npm run check:shell-landmarks && npm run check:route-state-coverage

      - name: Onboarding stale cron env documented
        run: npm run check:onboarding-stale-env-parity

      - name: Library createAdminClient allowlist
        run: npm run check:server-lib-admin

      - name: Tracked secrets and coverage hygiene
        run: npm run check:tracked-secrets-hygiene

      - name: Outbound fetch contract (API routes)
        run: npm run check:outbound-fetch

      - name: Security enforcement matrix
        run: npm run check:security-enforcement-matrix

      - name: Subprocessors artifact drift
        run: npm run check:subprocessors-drift

      - name: NEXT_PUBLIC surface hygiene
        run: npm run check:next-public-surface

      - name: Unsafe deserialization import grep
        run: npm run check:unsafe-deserialization

      - name: dangerouslySetInnerHTML allowlist
        run: npm run check:dangerously-set-inner-html

      - name: Supply-chain external waiver registry
        run: npm run check:supply-chain-waivers

      - name: postMessage origin inventory
        run: npm run check:postmessage-origins

      - name: next/script SRI inventory
        run: npm run check:next-script-integrity

      - name: Certificate transparency host config (strict)
        env:
          CT_STRICT: "1"
        run: npm run check:certificate-transparency

      - name: Performance static audit (strict; zero WARN)
        run: npm run check:performance-static:strict

      - name: Autonomous perf EXT registry consistency
        run: npm run check:autonomous-perf-registry

      - name: QA loading.tsx checklist vs repo
        run: npm run check:qa-loading-routes

      - name: QA route coverage TSV hygiene
        run: npm run check:qa-route-coverage-tsv

      - name: QA bug log JSON schema
        run: npm run check:qa-bug-log

      - name: Refinement acceptance checklist commands
        run: npm run check:refinement-acceptance-commands

      - name: Migration prefix guard
        run: npm run check:migrations

      - name: API route auth contract
        run: npm run check:api-route-auth-contract

      - name: API route auth inventory path index
        run: npm run check:api-route-auth-route-index

      - name: Security route matrix, proxy matrix, program checks, SEC coverage gate
        run: npm run report:security-route-matrix && npm run report:security-proxy-matrix && npm run build:security-control-coverage-matrix && npm run check:autonomous-security-program && npm run check:security-control-coverage && npm run check:security-fetch-sinks:strict

      - name: API route admin org-scope contract
        run: npm run check:api-route-admin-org-scope

      - name: Server action exports (no sync exports in use server)
        run: npm run check:server-action-exports

      - name: Server action auth contract
        run: npm run check:server-action-auth-contract

      - name: Server action org-scope contract
        run: npm run check:server-action-org-scope

      - name: API route test coverage (explicit guardrail)
        run: npm run check:api-route-tests

      - name: API route parity report (telemetry)
        run: npm run report:api-route-tests

      - name: Owner metadata guardrails
        run: npm run check:owner-metadata

      - name: Skip governance report (telemetry)
        run: npm run report:test-skip-governance

      - name: Skip governance ratchet
        run: npm run check:test-skip-governance

      - name: E2E skip baseline delta report (telemetry)
        run: npm run report:e2e:skip-baseline

      - name: E2E skip baseline ratchet (strict)
        run: npm run check:e2e:skip-baseline

      - name: Hardening debt inventory (telemetry)
        run: npm run report:hardening-debt

      - name: Hardening debt ratchet
        run: npm run check:hardening-debt-ratchet

      - name: Check integrity meta-governance
        run: npm run check:checks-integrity-meta

      - name: Branch-protection drift check
        run: npm run check:branch-protection-drift

      - name: Config drift check
        run: npm run check:config-drift

      - name: Security env contract
        run: npm run check:security-env-contract

      - name: Required security checkset
        run: npm run check:required-security-checkset

      - name: AI context redaction
        run: npm run check:ai-context-redaction

      - name: AI prompt injection guards
        run: npm run check:ai-prompt-injection-guards

      - name: AI tool call authz
        run: npm run check:ai-tool-call-authz

      - name: Token security quality
        run: npm run check:token-security-quality

      - name: Report redaction contract
        run: npm run check:report-redaction-contract

      - name: V10 privacy scan
        run: npm run check:v10-privacy-scan

      - name: Feature-flag security bypass
        run: npm run check:feature-flag-security-bypass

      - name: Rate-limit distribution safety
        run: npm run check:rate-limit-distribution-safety

      - name: Idempotency policy
        run: npm run check:idempotency-policy

      - name: Job lock guards
        run: npm run check:job-lock-guards

      - name: Timeout budget guards
        run: npm run check:timeout-budget-guards

      - name: Governance owner summary (telemetry)
        run: npm run report:governance-owners

      - name: Governance auditability report (telemetry)
        run: npm run report:governance-auditability

      - name: API rate-limit coverage (explicit guardrail)
        run: npm run check:api-route-rate-limit-coverage

      - name: API rate-limit coverage report (telemetry)
        run: npm run report:api-route-rate-limit-coverage

      - name: Cron route auth coverage (explicit guardrail)
        run: npm run check:cron-route-auth

      - name: Vercel cron paths vs canary map parity
        run: npm run check:vercel-cron-canary-parity

      - name: Integration contract surface report (telemetry)
        run: npm run report:integration-contract-surface

      - name: Integration contract resilience check
        run: npm run check:integration-contract-resilience

      - name: Concurrency hotspot report (telemetry)
        run: npm run report:concurrency-hotspots

      - name: Concurrency hotspot ratchet
        run: npm run check:concurrency-hotspots-ratchet

      - name: Policy conformance score (telemetry)
        run: npm run report:policy-conformance-score

      - name: Control efficacy report (telemetry)
        run: npm run report:control-efficacy

      - name: Artifact integrity report (telemetry)
        run: npm run report:artifact-integrity

      - name: Artifact integrity checks
        run: npm run check:artifact-integrity

      - name: Dependency sunset readiness (telemetry)
        run: npm run report:dependency-sunset-readiness

      - name: Canary blast-radius report (telemetry)
        run: npm run report:canary-blast-radius

      - name: Chaos readiness report (telemetry)
        run: npm run report:chaos-readiness

      - name: Incident readiness checks
        run: npm run check:incident-readiness:strict

      - name: Change-impact check mapping (telemetry)
        run: node scripts/check-ci-change-impact.mjs

      - name: CI provenance report (telemetry)
        if: ${{ always() }}
        run: npm run report:ci-provenance

      - name: SBOM generation
        run: npm run sbom

      - name: Lockfile integrity drift
        run: npm run check:lockfile-integrity-drift

      - name: SBOM integrity
        run: npm run check:sbom-integrity

      - name: Release artifact provenance
        run: npm run check:release-artifact-provenance

      - name: Outbound events + client hash + copy audits (verify parity)
        run: npm run check:ci-verify-extras

      - name: Vercel cron vs codebase alignment
        run: npm run check:vercel-cron

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Type/lint ratchet
        run: npm run check:type-lint-ratchet

      - name: Server action complexity ratchet
        run: npm run check:server-action-complexity

      - name: Type/lint strictness telemetry
        if: ${{ always() }}
        run: npm run report:type-lint-strictness

  quality_unit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security matrix JSON for Vitest evidence
        run: npm run build:security-control-coverage-matrix

      - name: Vitest logic + UI coverage
        run: npm run test:coverage

  quality_security:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install "semgrep>=1.90.0"

      - name: Semgrep (OSS + Oblixa rules)
        run: semgrep scan --config p/ci --config p/typescript --config semgrep/oblixa-security.yml --config semgrep/oblixa-performance.yml --config semgrep/oblixa-v7-surface.yml --config semgrep/oblixa-v8-surface.yml --config semgrep/oblixa-v10-surface.yml --severity ERROR --error .

      - name: OSV dependency scan
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        with:
          scan-args: |-
            --lockfile=package-lock.json

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality_build_e2e:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
      PLAYWRIGHT_JSON_REPORT: test-results/playwright-report.json
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
    steps:
      - name: Gate E2E (authenticated credentials)
        id: gate_e2e
        run: |
          if [ -n "$E2E_TEST_EMAIL" ] && [ -n "$E2E_TEST_PASSWORD" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$ALLOW_SECRET_GATED_SKIP" = "true" ] || [ "$ALLOW_CI_SKIP_E2E_AUTH" = "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::E2E skipped via ALLOW_CI_SKIP_E2E_AUTH or ALLOW_SECRET_GATED_SKIP."
          else
            echo "::error::quality_build_e2e requires E2E_TEST_EMAIL and E2E_TEST_PASSWORD. Set secrets or ALLOW_CI_SKIP_E2E_AUTH=true / ALLOW_SECRET_GATED_SKIP=true."
            exit 1
          fi

      - name: Skip E2E (explicit waiver / missing credentials)
        if: ${{ steps.gate_e2e.outputs.run != 'true' }}
        run: echo "Skipping E2E (waived via repository variable or secrets missing)."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        run: npm ci

      - name: Cache Playwright browsers
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'playwright.config.ts') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Production build
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        run: npm run build

      - name: Autonomous perf Tier A (emit run.json; post-build)
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        env:
          PERF_SKIP_BUILD: "1"
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          RUNNER_OS: ${{ runner.os }}
        run: npm run perf:autonomous:postbuild

      - name: Upload autonomous perf run artifact
        if: ${{ steps.gate_e2e.outputs.run == 'true' && always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: autonomous-perf-run
          path: artifacts/autonomous-perf-run.json
          if-no-files-found: ignore

      - name: Install Playwright Chromium
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        run: npm run test:e2e:smoke

      - name: Playwright V10 release smoke
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        run: npm run test:e2e:v10

      - name: Playwright accessibility lanes
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        run: npm run test:e2e:a11y

      - name: Playwright visual baselines (public/external)
        if: ${{ steps.gate_e2e.outputs.run == 'true' }}
        run: npm run test:e2e:visual

      - name: Playwright stability telemetry
        if: ${{ steps.gate_e2e.outputs.run == 'true' && always() }}
        run: npm run report:e2e:stability

      - name: Playwright stability thresholds
        if: ${{ steps.gate_e2e.outputs.run == 'true' && always() }}
        run: npm run check:e2e:stability-threshold

      - name: CI provenance report (telemetry)
        if: ${{ steps.gate_e2e.outputs.run == 'true' && always() }}
        run: npm run report:ci-provenance

  quality_static_surface:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client
      - name: V10 inventory lock
        run: npm run check:v10-inventory-lock
      - name: V10 release evidence
        run: npm run check:v10-release-evidence
      - name: V10 release privacy scan
        run: npm run check:v10-privacy-scan
      - name: V10 migration smoke (disposable PostgreSQL)
        env:
          V10_MIGRATION_SMOKE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          V10_MIGRATION_SMOKE_ALLOW_MUTATING_DATABASE: "1"
        run: npm run check:v10-migration-smoke -- --strict
      - name: V10 complete closure
        run: npm run check:v10-complete-closure
      - name: V10 zero exclusion report
        run: npm run check:v10-zero-exclusion-report
      - name: V10 suite
        run: npm run check:v10-suite
      - name: Surface suite pipeline
        run: npm run pipeline:surface:suite
      - name: Operational UI strict audit
        run: npm run audit:ui-operational:strict
      - name: Core terminology strict audit
        run: npm run audit:core-terminology:strict

  quality_static_governance:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Governance checks
        run: npm run check:owner-metadata && npm run check:checks-integrity-meta && npm run check:branch-protection-drift && npm run check:config-drift && npm run check:semgrep-rulepack-integrity
      - name: Workflow and command integrity
        run: npm run check:command-reference-integrity && npm run check:script-registry-integrity && npm run check:unused-script-files && npm run check:wrapper-reintroduction && npm run check:tier-coverage:strict && npm run check:workflow-tier-coverage:strict

  quality_static_codehealth:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Static codehealth pipeline
        run: npm run pipeline:ci:static
      - name: Bundle budget guard
        run: npm run check:bundle-budget
      - name: Import boundary and cycle checks
        run: npm run check:import-boundaries && npm run check:dependency-cycles && npm run check:script-complexity-ratchet && npm run check:feature-flag-lifecycle && npm run check:frontend-component-complexity && npm run check:server-action-complexity
      - name: Script runtime tests
        run: npm run test:scripts

  # Optional: set repository secret E2E_ONBOARDING_FULL to a non-empty value to run deep onboarding + multi-browser Playwright.
  quality_e2e_onboarding_full:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      E2E_ONBOARDING_BLOCKING: "1"
      E2E_ONBOARDING_A11Y: "1"
      E2E_ONBOARDING_EXPORT: "1"
      PLAYWRIGHT_ONBOARDING_DEEP: "1"
    steps:
      - name: Gate onboarding full run
        id: gate_onboarding
        run: |
          if [ -n "$E2E_ONBOARDING_FULL" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip onboarding full run (flag disabled)
        if: ${{ steps.gate_onboarding.outputs.run != 'true' }}
        run: echo "Skipping onboarding full run because E2E_ONBOARDING_FULL is not set."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: ${{ steps.gate_onboarding.outputs.run == 'true' }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        if: ${{ steps.gate_onboarding.outputs.run == 'true' }}
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate_onboarding.outputs.run == 'true' }}
        run: npm ci

      - name: Cache Playwright browsers
        if: ${{ steps.gate_onboarding.outputs.run == 'true' }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'playwright.config.ts') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Production build
        if: ${{ steps.gate_onboarding.outputs.run == 'true' }}
        run: npm run build

      - name: Install Playwright Chromium, Firefox, WebKit
        if: ${{ steps.gate_onboarding.outputs.run == 'true' }}
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Require authenticated E2E credentials
        if: ${{ steps.gate_onboarding.outputs.run == 'true' }}
        run: |
          test -n "$E2E_TEST_EMAIL" || (echo "Missing E2E_TEST_EMAIL secret" && exit 1)
          test -n "$E2E_TEST_PASSWORD" || (echo "Missing E2E_TEST_PASSWORD secret" && exit 1)

      - name: Onboarding deep E2E (multi-browser)
        if: ${{ steps.gate_onboarding.outputs.run == 'true' }}
        run: npm run test:e2e:onboarding-deep

      - name: Multi-browser public smoke
        if: ${{ steps.gate_onboarding.outputs.run == 'true' }}
        run: npm run test:e2e:multi-browser

  # Opt-in: set `if: true` (or gate on `vars`) to run four-way autodiscovered `check:*` shards (complements quality_static_*).
  # Set repository variable ENABLE_QA_ULTIMATE_PR_SHARD=true to run four-way autodiscovered check:* shards on PRs.
  qa_ultimate_pr_shard:
    if: ${{ vars.ENABLE_QA_ULTIMATE_PR_SHARD == 'true' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Autodiscovered check:* batch shard
        run: npm run qa:sweep:checks:batch
        env:
          CI: "true"
          QA_CHECK_BATCH_TOTAL: "4"
          QA_CHECK_BATCH_INDEX: ${{ matrix.shard_index }}

  # Single gate for branch protection / downstream jobs (parallel work happens in quality_*).
  quality:
    runs-on: ubuntu-latest
    # Legacy parity string for guard tests: needs: [quality_static, quality_unit, quality_security, quality_build_e2e]
    needs: [quality_static_security, quality_static_surface, quality_static_governance, quality_static_codehealth, quality_unit, quality_security, quality_build_e2e]
    steps:
      - name: All checks passed
        run: echo "ok"

  runtime_comprehensive_pass:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: quality
    steps:
      - name: Gate runtime comprehensive pass
        id: gate_runtime
        run: |
          if [ -n "$STAGING_BASE_URL" ] && [ -n "$CRON_SECRET" ] && [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] && [ -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && [ -n "$COMPREHENSIVE_PASS_EMAIL" ] && [ -n "$COMPREHENSIVE_PASS_PASSWORD" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$ALLOW_SECRET_GATED_SKIP" = "true" ] || [ "$ALLOW_CI_SKIP_RUNTIME_COMPREHENSIVE" = "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Runtime comprehensive pass skipped via ALLOW_CI_SKIP_RUNTIME_COMPREHENSIVE or ALLOW_SECRET_GATED_SKIP."
          else
            echo "::error::runtime_comprehensive_pass requires STAGING_BASE_URL, CRON_SECRET, SUPABASE_SERVICE_ROLE_KEY, NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, COMPREHENSIVE_PASS_EMAIL, COMPREHENSIVE_PASS_PASSWORD — or ALLOW_CI_SKIP_RUNTIME_COMPREHENSIVE=true / ALLOW_SECRET_GATED_SKIP=true."
            exit 1
          fi

      - name: Skip runtime comprehensive pass (explicit waiver / missing secrets)
        if: ${{ steps.gate_runtime.outputs.run != 'true' }}
        run: |
          echo "Skipping runtime comprehensive pass (waived or secrets missing)."
          echo "Required when run: STAGING_BASE_URL, CRON_SECRET, SUPABASE_SERVICE_ROLE_KEY,"
          echo "  NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,"
          echo "  COMPREHENSIVE_PASS_EMAIL, COMPREHENSIVE_PASS_PASSWORD"
          echo "Optional when running: HC_RUNTIME_COMPREHENSIVE_PING (healthcheck hooks)."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: ${{ steps.gate_runtime.outputs.run == 'true' }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        if: ${{ steps.gate_runtime.outputs.run == 'true' }}
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate_runtime.outputs.run == 'true' }}
        run: npm ci

      - name: Healthchecks start
        if: ${{ steps.gate_runtime.outputs.run == 'true' }}
        run: |
          if [ -n "$HC_RUNTIME_COMPREHENSIVE_PING" ]; then
            curl -fsS -m 10 "$HC_RUNTIME_COMPREHENSIVE_PING/start"
          fi

      - name: Runtime comprehensive pass (staging + local Next fallback)
        if: ${{ steps.gate_runtime.outputs.run == 'true' }}
        env:
          COMPREHENSIVE_PASS_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          COMPREHENSIVE_PASS_EMAIL: ${{ secrets.COMPREHENSIVE_PASS_EMAIL }}
          COMPREHENSIVE_PASS_PASSWORD: ${{ secrets.COMPREHENSIVE_PASS_PASSWORD }}
        run: |
          set -euo pipefail
          base="${COMPREHENSIVE_PASS_BASE_URL%/}"
          probe=$(curl -g -s -o /dev/null -w "%{http_code}" --max-time 20 "${base}/api/reminders/send" || echo "000")
          if [ "$probe" = "401" ]; then
            npm run check:comprehensive-pass
          else
            echo "WARN staging cron probe returned HTTP ${probe} (expected 401); building local Next for comprehensive-pass fallback"
            npm run build
            PORT=3000 npm run start &
            start_pid=$!
            trap 'kill "$start_pid" 2>/dev/null || true' EXIT
            code="000"
            for _ in $(seq 1 90); do
              code=$(curl -g -s -o /dev/null -w "%{http_code}" --max-time 8 http://127.0.0.1:3000/api/reminders/send || echo "000")
              if [ "$code" = "401" ]; then break; fi
              sleep 2
            done
            if [ "$code" != "401" ]; then
              echo "::error::Local next start never returned HTTP 401 for unsigned GET /api/reminders/send (last status ${code})"
              exit 1
            fi
            export NEXT_PUBLIC_APP_URL=http://127.0.0.1:3000
            npm run check:comprehensive-pass
          fi

      - name: CI provenance report (telemetry)
        if: ${{ steps.gate_runtime.outputs.run == 'true' && always() }}
        run: npm run report:ci-provenance

      - name: Healthchecks success
        if: ${{ steps.gate_runtime.outputs.run == 'true' && success() }}
        run: |
          if [ -n "$HC_RUNTIME_COMPREHENSIVE_PING" ]; then
            curl -fsS -m 10 "$HC_RUNTIME_COMPREHENSIVE_PING"
          fi

      - name: Healthchecks fail
        if: ${{ steps.gate_runtime.outputs.run == 'true' && failure() }}
        run: |
          if [ -n "$HC_RUNTIME_COMPREHENSIVE_PING" ]; then
            curl -fsS -m 10 "$HC_RUNTIME_COMPREHENSIVE_PING/fail"
          fi
