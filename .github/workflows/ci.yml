name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Keep repository secrets scoped to the smallest job or step that needs them.

jobs:
  # Split so static analysis + unit tests overlap with build + E2E (wall-clock win on CI).
  quality_static_security:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: SBOM (CycloneDX, package-lock)
        run: npm run sbom

      - name: Dual SBOM evidence (CycloneDX + SPDX)
        run: npm run check:sbom-dual-format-evidence

      - name: SBOM license allowlist spot-check
        run: npm run check:license-sbom

      - name: SBOM diff / VEX stub gate
        run: npm run check:sbom-diff

      - name: Supply-chain static enforcement contracts
        run: npm run check:supply-chain-dependency-risk && npm run check:dependency-policy && npm run check:dependency-confusion-guards && npm run check:npm-script-integrity && npm run check:npm-lifecycle && npm run check:install-script-risk && npm run check:executable-masquerade-guards && npm run check:dynamic-import-specifiers && npm run check:test-fixture-secrets && npm run check:ci-artifact-secret-leakage && npm run check:supply-chain-waivers && npm run check:codeowners-security-paths

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cyclonedx-sbom
          path: cyclonedx-sbom.json
          if-no-files-found: ignore
          retention-days: 14
          include-hidden-files: false

      - name: Dependency risk summary (telemetry)
        if: ${{ always() }}
        run: npm run report:dependency-risk

      - name: Security static greps (src/, strict)
        run: npm run check:security-static:strict:grep

      - name: GitHub workflow danger patterns
        run: npm run check:github-workflows-security

      - name: Workflow secret-gates registry (Epic 2)
        run: npm run check:github-scheduled-workflows-secrets

      - name: API runtime smoke registry drift (Epic 3)
        run: npm run check:api-runtime-smoke-registry

      - name: Strict route contract gates
        run: npm run check:route-functionality && npm run check:openapi-spec-contract && npm run check:api-problem-json && npm run check:auth-error-consistency && npm run check:middleware-vercel-metadata

      - name: API CORS policy
        run: npm run check:api-cors-policy

      - name: Maximal assurance scaffolding (plan snapshot, epics, waivers, catalog index)
        run: npm run check:maximal-assurance-scaffolding

      - name: PWA / deep-link well-known allowlist
        run: npm run check:pwa-well-known

      - name: .env.example parity vs src process.env
        run: npm run check:env-example-parity

      - name: Synthetic / SLO env contract
        run: npm run check:synthetic-slo-env

      - name: Onboarding QA matrix (tests + strict lib/onboarding glob)
        run: npm run check:onboarding-qa-matrix

      - name: Authenticated A11Y path-matrix integrity
        run: npm run check:authenticated-a11y-matrix

      - name: UI surface consistency contracts
        run: npm run check:ui-surface-consistency && npm run check:page-heading-contract && npm run check:shell-landmarks && npm run check:route-state-coverage

      - name: Onboarding stale cron env documented
