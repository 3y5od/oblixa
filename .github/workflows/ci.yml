name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Split so static analysis + unit tests overlap with build + E2E (wall-clock win on CI).
  quality_static:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: Migration prefix guard
        run: npm run check:migrations

      - name: API route test coverage (colocated or allowlist)
        run: npm run check:api-route-tests

      - name: Vercel cron vs codebase alignment
        run: npm run check:vercel-cron

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

  quality_unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest (with v5/security coverage thresholds)
        run: npm run test:coverage

  quality_security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install "semgrep>=1.90.0"

      - name: Semgrep (OSS rules)
        run: semgrep scan --config p/ci --config p/typescript --error .

      - name: OSV dependency scan
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5
        with:
          scan-args: |-
            --lockfile=package-lock.json

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality_build_e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Production build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Require authenticated E2E credentials
        run: |
          test -n "$E2E_TEST_EMAIL" || (echo "Missing E2E_TEST_EMAIL secret" && exit 1)
          test -n "$E2E_TEST_PASSWORD" || (echo "Missing E2E_TEST_PASSWORD secret" && exit 1)

      - name: Playwright smoke + accessibility
        run: npm run test:e2e

  # Single gate for branch protection / downstream jobs (parallel work happens in quality_*).
  quality:
    runs-on: ubuntu-latest
    needs: [quality_static, quality_unit, quality_security, quality_build_e2e]
    steps:
      - name: All checks passed
        run: echo "ok"

  runtime_comprehensive_pass:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    if: ${{ secrets.STAGING_BASE_URL != '' && secrets.CRON_SECRET != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.NEXT_PUBLIC_SUPABASE_URL != '' && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && secrets.COMPREHENSIVE_PASS_EMAIL != '' && secrets.COMPREHENSIVE_PASS_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Healthchecks start
        if: ${{ secrets.HC_RUNTIME_COMPREHENSIVE_PING != '' }}
        run: curl -fsS -m 10 "${{ secrets.HC_RUNTIME_COMPREHENSIVE_PING }}/start"

      - name: Runtime comprehensive pass (staging)
        env:
          COMPREHENSIVE_PASS_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          COMPREHENSIVE_PASS_EMAIL: ${{ secrets.COMPREHENSIVE_PASS_EMAIL }}
          COMPREHENSIVE_PASS_PASSWORD: ${{ secrets.COMPREHENSIVE_PASS_PASSWORD }}
        run: npm run check:comprehensive-pass

      - name: Healthchecks success
        if: ${{ success() && secrets.HC_RUNTIME_COMPREHENSIVE_PING != '' }}
        run: curl -fsS -m 10 "${{ secrets.HC_RUNTIME_COMPREHENSIVE_PING }}"

      - name: Healthchecks fail
        if: ${{ failure() && secrets.HC_RUNTIME_COMPREHENSIVE_PING != '' }}
        run: curl -fsS -m 10 "${{ secrets.HC_RUNTIME_COMPREHENSIVE_PING }}/fail"
