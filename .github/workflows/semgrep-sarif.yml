# Upload Semgrep results to GitHub Code Scanning (SARIF). Complements CI Semgrep --error gate.
name: Semgrep SARIF

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install "semgrep>=1.90.0"

      - name: Semgrep scan (SARIF)
        run: |
          semgrep scan \
            --config p/ci \
            --config p/typescript \
            --config semgrep/oblixa-security.yml \
            --config semgrep/oblixa-performance.yml \
            --config semgrep/oblixa-v7-surface.yml \
            --config semgrep/oblixa-v8-surface.yml \
            --config semgrep/oblixa-v10-surface.yml \
            --sarif --output semgrep.sarif \
            .

      - name: Normalize SARIF artifact URIs for GitHub
        run: node scripts/normalize-semgrep-sarif-uris.mjs semgrep.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@a723e99345b89ee0bbcbd68ee4e63f9a56b42a25
        with:
          sarif_file: semgrep.sarif
