name: QA k8s smoke stub

on:
  workflow_dispatch:
    inputs:
      k8s_policy_strict:
        description: "Set 1 to require k8s/conftest-policies bundle (K8S_POLICY_STRICT=1)"
        type: string
        default: "0"

permissions:
  contents: read

jobs:
  conftest_stub:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Policy-as-code stub (opt-in strict)
        env:
          K8S_POLICY_STRICT: ${{ github.event.inputs.k8s_policy_strict == '1' && '1' || '0' }}
        run: npm run check:k8s-conftest-stub
