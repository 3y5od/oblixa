name: QA release candidate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rc_qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Tier sweep (P3 when staging secrets exist in fork/org)
        run: npm run qa:sweep:max:p2
        env:
          CI: "true"
