name: QA taxonomy closure

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

concurrency:
  group: qa-taxonomy-closure-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  taxonomy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Bidirectional closure (workflows + check scripts)
        run: npm run qa:sweep:ultimate:taxonomy-bidirectional
        env:
          CI: "true"
      - name: Strict tier (execution audit advisory)
        run: npm run qa:sweep:ultimate:taxonomy-closure-strict
        env:
          CI: "true"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: qa-comprehensive-taxonomy-report
          path: artifacts/qa-comprehensive-taxonomy-report.json
