# Optional org-local secret scanning; stub job documents workflow until .secretlintrc.json is added.
name: Secretlint (optional stub)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 4"

permissions:
  contents: read

jobs:
  note:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Document optional secretlint
        run: |
          echo "Add .secretlintrc.json and run: npx secretlint@8 ."
          echo "Tracked hygiene remains: npm run check:tracked-secrets-hygiene"
