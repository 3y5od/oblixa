name: QA secrets history scan (optional)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog_placeholder:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: TruffleHog (disabled — enable with TRUFFLEHOG_VERIFIED_SECRET)
        run: |
          echo "EXT: wire trufflehog/trufflehog@<sha> with readonly org secret for periodic git history scan."
          exit 0
