name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 5 * * 3"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@0e150e40762c1253b364a04b0fc9f2cc14effff2
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@0e150e40762c1253b364a04b0fc9f2cc14effff2
      # Skip SARIF/Code Scanning API upload when Code Scanning is not enabled (or on fork PRs).
      # After enabling Code Scanning for the repo, set upload to "always" and upload-database to "true".
      - uses: github/codeql-action/analyze@0e150e40762c1253b364a04b0fc9f2cc14effff2
        with:
          upload: never
          upload-database: "false"
          wait-for-processing: "false"
