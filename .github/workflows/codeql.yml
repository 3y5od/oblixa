name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 5 * * 3"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: github/codeql-action/init@9c646c91e31ab31d6e812b6d6ff31848c0bbc637
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@9c646c91e31ab31d6e812b6d6ff31848c0bbc637
      - uses: github/codeql-action/analyze@9c646c91e31ab31d6e812b6d6ff31848c0bbc637
