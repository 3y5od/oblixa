name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 5 * * 3"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: github/codeql-action/init@a723e99345b89ee0bbcbd68ee4e63f9a56b42a25
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@a723e99345b89ee0bbcbd68ee4e63f9a56b42a25
      # Skip SARIF/Code Scanning API upload when Code Scanning is not enabled (or on fork PRs).
      # After enabling Code Scanning for the repo, set upload to "always" and upload-database to "true".
      - uses: github/codeql-action/analyze@a723e99345b89ee0bbcbd68ee4e63f9a56b42a25
        with:
          upload: never
          upload-database: "false"
          wait-for-processing: "false"
