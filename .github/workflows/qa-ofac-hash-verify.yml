name: QA OFAC sample hash verify

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - run: test -f artifacts/ofac-sdn-sample.sha256
