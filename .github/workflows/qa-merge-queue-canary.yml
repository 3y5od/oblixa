name: QA merge queue canary

on:
  workflow_dispatch:
  merge_group:

permissions:
  contents: read

jobs:
  expected_checks:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - run: |
          cat > expected-checks.json <<'JSON'
          {
            "jobs": [
              "CI / quality_static_security",
              "CI / quality_static_surface",
              "CI / quality_static_governance",
              "CI / quality_static_codehealth",
              "CI / quality_unit",
              "CI / quality_security",
              "CI / quality_build_e2e",
              "CI / quality"
            ],
            "categories": {
              "security": "CI / quality_static_security",
              "build": "CI / quality_build_e2e",
              "e2e": "CI / quality_build_e2e",
              "dependency": "CI / quality_static_security",
              "release": "CI / quality_static_governance"
            }
          }
          JSON
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: expected-checks
          path: expected-checks.json
          retention-days: 14
          include-hidden-files: false
