name: Dependency review

# Policy: artifacts/dependency-review-policy.json. Requires Dependency graph on the repo; private repos need
# GitHub Advanced Security for full API support — see https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/about-dependency-review
# Permissions: contents:read only (add pull-requests:write only if enabling comment-summary-in-pr).

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@f5b971718edcbb31275a1db40004592335c0e031
        with:
          fail-on-severity: high
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 300
