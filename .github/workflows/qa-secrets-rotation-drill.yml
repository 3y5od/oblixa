name: QA secrets rotation drill

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: test -f artifacts/secrets-rotation-drill.json && echo "drill manifest present"
