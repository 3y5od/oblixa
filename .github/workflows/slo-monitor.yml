name: SLO Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  HC_SLO_MONITOR_PING: ${{ secrets.HC_SLO_MONITOR_PING }}

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ env.NEXT_PUBLIC_SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' && env.HC_SLO_MONITOR_PING != '' }}
    steps:
      # Pinned SHAs (tags: checkout@v4, setup-node@v4)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Healthchecks start
        continue-on-error: true
        run: curl -fsS -m 10 "${{ env.HC_SLO_MONITOR_PING }}/start"

      - name: Run SLO monitor
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/slo-monitor.mjs

      - name: Healthchecks success
        if: ${{ success() }}
        continue-on-error: true
        run: curl -fsS -m 10 "${{ env.HC_SLO_MONITOR_PING }}"

      - name: Healthchecks fail
        if: ${{ failure() }}
        continue-on-error: true
        run: curl -fsS -m 10 "${{ env.HC_SLO_MONITOR_PING }}/fail"
