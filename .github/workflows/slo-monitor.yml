name: SLO Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  HC_SLO_MONITOR_PING: ${{ secrets.HC_SLO_MONITOR_PING }}
  REQUIRE_SLO_MONITOR: ${{ vars.REQUIRE_SLO_MONITOR }}

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Gate required secrets
        id: gate
        run: |
          bash scripts/github-actions/secret-gate.sh "SLO Monitor" "REQUIRE_SLO_MONITOR" "NEXT_PUBLIC_SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,HC_SLO_MONITOR_PING"

      - name: Skip SLO monitor (missing secrets)
        if: ${{ steps.gate.outputs.run != 'true' }}
        run: echo "Skipping SLO monitor because required secrets are missing."

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        if: ${{ steps.gate.outputs.run == 'true' }}
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: npm ci

      - name: Healthchecks start
        if: ${{ steps.gate.outputs.run == 'true' }}
        continue-on-error: true
        run: curl -fsS -m 10 "$HC_SLO_MONITOR_PING/start"

      - name: Run SLO monitor
        if: ${{ steps.gate.outputs.run == 'true' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/slo-monitor.mjs

      - name: Healthchecks success
        if: ${{ steps.gate.outputs.run == 'true' && success() }}
        continue-on-error: true
        run: curl -fsS -m 10 "$HC_SLO_MONITOR_PING"

      - name: Healthchecks fail
        if: ${{ steps.gate.outputs.run == 'true' && failure() }}
        continue-on-error: true
        run: curl -fsS -m 10 "$HC_SLO_MONITOR_PING/fail"
