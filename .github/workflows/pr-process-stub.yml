name: PR process stub

# Phase 14 — wire Danger, label bots, or required reviewers in org settings; this file documents intent without blocking PRs.

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read

jobs:
  migrations_and_generated_hints:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          echo "Optional: fail if migrations/ without label; e2e/generated touched without generate:*"
          echo "See CODEOWNERS and branch protection for enforcement."
