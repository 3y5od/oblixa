# Product-surface deletion guard — nudge reviewers when API routes or migrations are deleted.
name: Refinement deletion notice

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "src/app/api/**"
      - "supabase/migrations/**"

jobs:
  notice:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: List deleted API routes or migrations
        env:
          BASE: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch origin "${BASE}" --depth=1 2>/dev/null || true
          base=$(git merge-base HEAD "origin/${BASE}" 2>/dev/null || echo "HEAD~1")
          deleted=$(git diff --name-only --diff-filter=D "${base}"...HEAD | grep -E '^(src/app/api/.+/route\.ts|supabase/migrations/)' || true)
          if [ -n "${deleted}" ]; then
            echo "::notice title=Product-surface deletion guard::Destructive deletes under src/app/api or supabase/migrations — confirm this is not IA-only cleanup; prefer hide/gate."
            echo "${deleted}"
          fi
