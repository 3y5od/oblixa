name: QA DAST ZAP

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap_baseline:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: ZAP baseline (disabled — enable with STAGING_BASE_URL + ZAP image)
        run: |
          echo "See artifacts/zap-baseline.json allowlist."
          test -f artifacts/zap-baseline.json
