name: Cron Canary

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

env:
  STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  HC_CRON_CANARY_PING: ${{ secrets.HC_CRON_CANARY_PING }}

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ env.STAGING_BASE_URL != '' && env.CRON_SECRET != '' }}
    steps:
      # Pinned SHAs (tags: checkout@v4, setup-node@v4)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Healthchecks start
        if: ${{ env.HC_CRON_CANARY_PING != '' }}
        continue-on-error: true
        run: curl -fsS -m 10 "${{ env.HC_CRON_CANARY_PING }}/start"

      - name: Run cron canary checks
        env:
          COMPREHENSIVE_PASS_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: npm run check:cron-canary

      - name: Healthchecks success
        if: ${{ success() && env.HC_CRON_CANARY_PING != '' }}
        continue-on-error: true
        run: curl -fsS -m 10 "${{ env.HC_CRON_CANARY_PING }}"

      - name: Healthchecks fail
        if: ${{ failure() && env.HC_CRON_CANARY_PING != '' }}
        continue-on-error: true
        run: curl -fsS -m 10 "${{ env.HC_CRON_CANARY_PING }}/fail"
