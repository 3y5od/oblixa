name: Cron Canary

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  HC_CRON_CANARY_PING: ${{ secrets.HC_CRON_CANARY_PING }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  REQUIRE_CRON_CANARY: ${{ vars.REQUIRE_CRON_CANARY }}

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Gate required secrets
        id: gate
        run: |
          bash scripts/github-actions/secret-gate.sh "Cron Canary" "REQUIRE_CRON_CANARY" "STAGING_BASE_URL,CRON_SECRET"

      - name: Skip cron canary (missing secrets)
        if: ${{ steps.gate.outputs.run != 'true' }}
        run: echo "Skipping cron canary because required secrets are missing."

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        if: ${{ steps.gate.outputs.run == 'true' }}
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: npm ci

      - name: Healthchecks start
        if: ${{ steps.gate.outputs.run == 'true' }}
        continue-on-error: true
        run: |
          if [ -n "$HC_CRON_CANARY_PING" ]; then
            curl -fsS -m 10 "$HC_CRON_CANARY_PING/start"
          fi

      - name: Run cron canary checks
        if: ${{ steps.gate.outputs.run == 'true' }}
        env:
          COMPREHENSIVE_PASS_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_CANARY_FAIL_ON_OK_FALSE: "1"
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          APP_BASE_URL: http://127.0.0.1:3000
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          set -euo pipefail
          base="${COMPREHENSIVE_PASS_BASE_URL%/}"
          probe=$(curl -g -s -o /dev/null -w "%{http_code}" --max-time 20 "${base}/api/reminders/send" || echo "000")
          if [ "$probe" = "401" ] || [ "$probe" = "503" ]; then
            npm run check:cron-canary
          else
            echo "WARN staging cron probe returned HTTP ${probe} (expected 401 or 503); building local Next for cron-canary fallback"
            export RESEND_API_KEY="${RESEND_API_KEY:-cron-canary-local-placeholder}"
            export EMAIL_FROM="${EMAIL_FROM:-onboarding@resend.dev}"
            npm run build
            PORT=3000 npm run start &
            start_pid=$!
            trap 'kill "$start_pid" 2>/dev/null || true' EXIT
            code="000"
            for _ in $(seq 1 90); do
              code=$(curl -g -s -o /dev/null -w "%{http_code}" --max-time 8 http://127.0.0.1:3000/api/reminders/send || echo "000")
              if [ "$code" = "401" ] || [ "$code" = "503" ]; then break; fi
              sleep 2
            done
            if [ "$code" != "401" ] && [ "$code" != "503" ]; then
              echo "::error::Local next start never returned HTTP 401/503 for unsigned GET /api/reminders/send (last status ${code})"
              exit 1
            fi
            npm run check:cron-canary
          fi

      - name: Healthchecks success
        if: ${{ steps.gate.outputs.run == 'true' && success() }}
        continue-on-error: true
        run: |
          if [ -n "$HC_CRON_CANARY_PING" ]; then
            curl -fsS -m 10 "$HC_CRON_CANARY_PING"
          fi

      - name: Healthchecks fail
        if: ${{ steps.gate.outputs.run == 'true' && failure() }}
        continue-on-error: true
        run: |
          if [ -n "$HC_CRON_CANARY_PING" ]; then
            curl -fsS -m 10 "$HC_CRON_CANARY_PING/fail"
          fi
