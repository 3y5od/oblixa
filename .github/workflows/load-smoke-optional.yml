name: Load smoke optional (Epic 8)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * 0"

permissions:
  contents: read

env:
  STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}

jobs:
  load_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Gate staging target
        id: gate
        env:
          ALLOW_LOAD_SMOKE_SKIP: ${{ vars.ALLOW_LOAD_SMOKE_SKIP }}
          ALLOW_SECRET_GATED_SKIP: ${{ vars.ALLOW_SECRET_GATED_SKIP }}
        run: |
          if [ -n "$STAGING_BASE_URL" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$ALLOW_SECRET_GATED_SKIP" = "true" ] || [ "$ALLOW_LOAD_SMOKE_SKIP" = "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Load smoke skipped via ALLOW_LOAD_SMOKE_SKIP or ALLOW_SECRET_GATED_SKIP."
          else
            echo "::error::Load smoke requires STAGING_BASE_URL. Set the secret or ALLOW_LOAD_SMOKE_SKIP=true / ALLOW_SECRET_GATED_SKIP=true."
            exit 1
          fi

      - name: Skip load smoke (explicit waiver / missing secrets)
        if: ${{ steps.gate.outputs.run != 'true' }}
        run: echo "Skipping load smoke (waived via repository variable or secrets missing)."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: ${{ steps.gate.outputs.run == 'true' }}

      - name: Run k6 staging smoke
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: |
          docker run --rm \
            -e STAGING_BASE_URL="$STAGING_BASE_URL" \
            -v "$PWD:/work" \
            -w /work \
            grafana/k6:0.53.0 run loadtests/k6-staging-smoke.js
