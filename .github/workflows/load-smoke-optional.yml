name: Load smoke optional (Epic 8)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * 0"

permissions:
  contents: read

env:
  STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
  REQUIRE_LOAD_SMOKE: ${{ vars.REQUIRE_LOAD_SMOKE }}

jobs:
  load_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Gate staging target
        id: gate
        run: |
          bash scripts/github-actions/secret-gate.sh "Load smoke optional" "REQUIRE_LOAD_SMOKE" "STAGING_BASE_URL"

      - name: Skip load smoke (missing secrets)
        if: ${{ steps.gate.outputs.run != 'true' }}
        run: echo "Skipping load smoke because STAGING_BASE_URL is unavailable."

      - name: Run k6 staging smoke
        if: ${{ steps.gate.outputs.run == 'true' }}
        run: |
          docker run --rm \
            -e STAGING_BASE_URL="$STAGING_BASE_URL" \
            -v "$PWD:/work" \
            -w /work \
            grafana/k6:0.53.0 run loadtests/k6-staging-smoke.js
