# Local chaos / network delay experiments (optional). Do not point at production.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: chaos
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 10

  app:
    image: node:20-alpine
    working_dir: /work
    command: ["node", "-e", "require('http').createServer((_,r)=>{r.writeHead(200);r.end('ok');}).listen(3999,'0.0.0.0')"]
    ports:
      - "13999:3999"
    depends_on:
      postgres:
        condition: service_healthy

  toxiproxy:
    image: shopify/toxiproxy:2.9.0
    ports:
      - "8474:8474"
