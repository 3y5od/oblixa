# Gitleaks configuration (used by gitleaks/gitleaks-action in CI).
# Centralizes allowlists; keep .gitleaksignore empty or remove it to avoid duplicate rules.

title = "oblixa"

[extend]
useDefault = true

# Vitest and Playwright use intentional fake credentials (Stripe test mode, cron placeholders, etc.).
# Prefer fixing accidental real secrets in tests rather than expanding this list.
[allowlist]
description = "E2E and unit test fixtures"
paths = [
  '''^e2e/''',
  '''.*\.test\.ts$''',
  '''.*\.test\.tsx$''',
]
