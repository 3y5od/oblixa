# V10-specific guardrails. Deterministic release checks enforce most coverage;
# this pack catches high-signal regressions in service-role reads and cron routes.
rules:
  - id: oblixa-v10-service-role-read-needs-visibility-helper
    languages: [typescript]
    message: >
      Member-facing V10 service-role reads should use applyV10ReadModelVisibility,
      applyV10CommandSearchVisibility, or equivalent organization/visibility/role filtering.
    severity: ERROR
    patterns:
      - pattern: |
          $ADMIN.from("v10_$TABLE").select(...)
      - pattern-not-inside: |
          applyV10ReadModelVisibility(...)
      - pattern-not-inside: |
          applyV10CommandSearchVisibility(...)
      - pattern-not: |
          $ADMIN.from("v10_$TABLE").select(...).eq("organization_id", ...).eq("visibility_state", "visible").in("required_role_minimum", ...)
    paths:
      include:
        - /src/app/**/*.ts
        - /src/app/**/*.tsx
        - /src/lib/**/*.ts
      exclude:
        - /src/app/api/cron/**/route.ts
        - /src/lib/v10-read-model-refresh.ts
        - /src/lib/v10-server-contracts.ts

  - id: oblixa-v10-cron-needs-private-no-store
    languages: [typescript]
    message: >
      V10 cron routes must return private no-store responses so diagnostics and maintenance counts are not cached.
    severity: ERROR
    patterns:
      - pattern: |
          export async function GET(...) {
            ...
          }
      - pattern-not: |
          export async function GET(...) {
            ...
            const PRIVATE_NO_STORE_HEADERS = { "Cache-Control": "private, no-store" };
            ...
          }
    paths:
      include:
        - /src/app/api/cron/v10/**/route.ts

  - id: oblixa-v10-cron-needs-cron-auth
    languages: [typescript]
    message: >
      V10 cron routes must authenticate with ensureCronAuthorized before executing maintenance or refresh work.
    severity: ERROR
    patterns:
      - pattern: |
          export async function GET($REQUEST: Request) {
            ...
          }
      - pattern-not: |
          export async function GET($REQUEST: Request) {
            ...
            ensureCronAuthorized($REQUEST)
            ...
          }
    paths:
      include:
        - /src/app/api/cron/v10/**/route.ts

  - id: oblixa-v10-privacy-scan-no-file-wide-redaction-bypass
    languages: [javascript]
    message: >
      V10 privacy scans must not waive an entire file because it mentions privacy_redaction_cases;
      redaction exceptions must be line-scoped.
    severity: ERROR
    pattern: |
      content.includes("privacy_redaction_cases")
    paths:
      include:
        - /scripts/check-v10-release-evidence.mjs

  - id: oblixa-v10-telemetry-no-private-detail-keys
    languages: [typescript]
    message: >
      V10 telemetry details must not include private payload key names such as raw contract text,
      emails, tokens, signed URLs, or file URLs. Use safe state/count fields instead.
    severity: ERROR
    pattern-regex: '(raw_contract_text|contract_text|responder_email|owner_email|signed_url|private_url|file_url|file_name|access_token|refresh_token|id_token|api_token|bearer_token|session_token|auth_token|secret)\s*:'
    paths:
      include:
        - /src/lib/v10-objective-telemetry.ts
        - /src/lib/product-telemetry.ts
        - /src/actions/product-telemetry.ts
        - /src/lib/v10-readiness-scorecard.ts
      exclude:
        - /src/lib/product-telemetry.v10.test.ts
        - /src/**/*.test.ts
        - /src/**/*.test.tsx
        - /src/lib/types/**

  - id: oblixa-v10-mutation-actor-must-be-server-derived
    languages: [typescript]
    message: >
      V10 mutation actorUserId must come from authenticated server context, not request bodies,
      payload objects, form fields, or request-derived helper inputs.
    severity: ERROR
    pattern-either:
      - pattern-regex: 'actorUserId\s*:\s*String\([^\n]*formData\.get\('
      - pattern-regex: 'actorUserId\s*:\s*(body|requestBody|clientBody|payload)\??\.[A-Za-z0-9_]+'
      - pattern-regex: 'actorUserId\s*:\s*[^,\n]*get[A-Za-z0-9_]*FromRequest\('
    paths:
      include:
        - /src/app/**/*.ts
        - /src/actions/**/*.ts
        - /src/lib/**/*.ts
      exclude:
        - /src/**/*.test.ts
        - /src/**/*.test.tsx
        - /src/lib/v10-server-contracts.ts

  - id: oblixa-v10-mutation-next-destination-no-unsafe-query
    languages: [typescript]
    message: >
      V10 mutation nextDestinationHref values must not embed titles, emails, tokens, signatures,
      secrets, or passwords in query strings.
    severity: ERROR
    pattern-regex: 'nextDestinationHref\s*:\s*(["\''"]|`)[^\n]*\?(?=[^\n]*(token|signature|secret|password|email|title)=)[^\n]*\1'
    paths:
      include:
        - /src/app/**/*.ts
        - /src/actions/**/*.ts
        - /src/lib/**/*.ts
      exclude:
        - /src/**/*.test.ts
        - /src/**/*.test.tsx
