rules:
  - id: oblixa-createadminclient-in-use-client
    languages: [typescript]
    severity: ERROR
    message:
      createAdminClient (service-role Supabase client) must not be used in a "use client" module.
      Keep admin queries in Server Components, Server Actions, route handlers, or src/lib helpers
      consumed only from the server.
    patterns:
      - pattern-inside: |
          "use client";
          ...
      - pattern: createAdminClient

  - id: oblixa-supabase-server-import-in-use-client
    languages: [typescript]
    severity: ERROR
    message: Import from @/lib/supabase/server must not appear in a "use client" module (server-only).
    patterns:
      - pattern-inside: |
          "use client";
          ...
      - pattern-regex: from\s+["']@/lib/supabase/server["']

  - id: oblixa-service-role-key-in-components
    languages: [typescript]
    severity: ERROR
    message: SUPABASE_SERVICE_ROLE_KEY must not appear under src/components (client bundle risk if ever referenced).
    pattern: SUPABASE_SERVICE_ROLE_KEY
    paths:
      include:
        - "/src/components/**"

  - id: oblixa-dangerously-set-inner-html
    languages: [typescript]
    severity: WARNING
    message: Review dangerouslySetInnerHTML; ensure HTML is trusted or sanitized.
    pattern: dangerouslySetInnerHTML

  - id: oblixa-cleartext-http-string
    languages: [typescript, javascript]
    severity: WARNING
    message:
      Cleartext http:// URL literal in application code; prefer https for production endpoints
      or keep scoped to documented dev defaults (see src/lib/app-url.ts).
    pattern-regex: >-
      http://(?!(?:localhost|127\.0\.0\.1|0\.0\.0\.0|example\.test|evil\.example)(?::\d+)?(?:/|$|\?|["'`,)\s]))
    paths:
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.spec.ts"
        - "**/e2e/**"
        - "/src/lib/app-url.ts"
        - "/src/lib/security/safe-external-href.ts"

  - id: oblixa-dynamic-import-variable-specifier
    languages: [typescript]
    severity: INFO
    message:
      Dynamic import() with a non-literal specifier risks module path injection if user input
      reaches the specifier; prefer static imports or a fixed allowlist map.
    patterns:
      - pattern-either:
          - pattern: import($X)
          - pattern: import(`${$X}...`)
      - pattern-not: import("...")
      - pattern-not: import('...')
      - pattern-not: import(`...`)
    paths:
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.spec.ts"
        - "**/e2e/**"
        - "**/instrumentation.ts"

  - id: oblixa-prototype-pollution-key-string
    languages: [typescript, javascript]
    severity: INFO
    message: Review use of __proto__/constructor/prototype string keys near JSON or user input (prototype pollution).
    pattern-regex: "[\"'](?:__proto__|constructor|prototype)[\"']"
    paths:
      exclude:
        - "**/*.test.ts"
        - "**/strip-prototype-pollution.ts"
        - "**/strip-prototype-pollution.test.ts"

  - id: oblixa-migration-security-definer
    languages: [generic]
    severity: INFO
    message:
      SECURITY DEFINER in migrations elevates privileges; confirm scope is minimal and document
      rationale in the migration or linked issue.
    pattern-regex: (?mi)^(?!\s*--).*SECURITY\s+DEFINER
    paths:
      include:
        - "/supabase/migrations/**"

  - id: oblixa-stripe-secret-in-components
    languages: [typescript]
    severity: ERROR
    message: STRIPE_SECRET_KEY must not appear under src/components (client bundle risk).
    pattern: STRIPE_SECRET_KEY
    paths:
      include:
        - "/src/components/**"

  - id: oblixa-logs-authorization-or-bearer
    languages: [typescript, javascript]
    severity: ERROR
    message:
      Avoid logging authorization headers, bearer tokens, or webhook signatures.
      Log only redacted values.
    pattern-regex: >-
      (console\.(?:log|info|warn|error)|logger\.(?:debug|info|warn|error))\s*\([^)]*(?:authorization|bearer|stripe-signature|x-api-key)
    paths:
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.spec.ts"

  - id: oblixa-api-raw-error-leak
    languages: [typescript]
    severity: ERROR
    message:
      Avoid returning raw Error objects or stack traces in API responses.
      Return safe error codes/messages instead.
    pattern-regex: >-
      NextResponse\.json\s*\([^)]*(?:error\s*:\s*(?:error|err)\b(?!\s*\.)|stack\s*:)[^)]*\)

  - id: oblixa-security-no-direct-eval
    languages: [typescript, javascript]
    severity: ERROR
    message: Avoid eval(); use structured parsing (SEC-IN-008).
    pattern: eval($X)
    paths:
      include:
        - "/src/**/*.ts"
        - "/src/**/*.tsx"
